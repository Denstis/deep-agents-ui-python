<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Agents UI - Python + LM Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid #333;
            background-color: #111;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .header-buttons {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #1a1a1a;
            color: #fff;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #2a2a2a;
        }
        .btn-primary {
            background-color: #2F6868;
            border-color: #2F6868;
        }
        .btn-primary:hover {
            background-color: #3d7a7a;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            border-right: 1px solid #333;
            background-color: #111;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .thread-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .thread-item {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 0.25rem;
            transition: background-color 0.2s;
        }
        .thread-item:hover {
            background-color: #1a1a1a;
        }
        .thread-item.active {
            background-color: #2F6868;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .message {
            margin-bottom: 1.5rem;
            max-width: 80%;
        }
        .message.user {
            margin-left: auto;
            background-color: #2F6868;
            padding: 1rem;
            border-radius: 12px 12px 4px 12px;
        }
        .message.assistant {
            margin-right: auto;
            background-color: #1a1a1a;
            padding: 1rem;
            border-radius: 12px 12px 12px 4px;
        }
        .message-content {
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .input-container {
            padding: 1rem 1.5rem;
            border-top: 1px solid #333;
            background-color: #111;
        }
        .input-form {
            display: flex;
            gap: 0.5rem;
        }
        .message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #1a1a1a;
            color: #fff;
            font-size: 0.875rem;
            resize: none;
        }
        .message-input:focus {
            outline: none;
            border-color: #2F6868;
        }
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }
        .modal h2 {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #aaa;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #111;
            color: #fff;
            font-size: 0.875rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2F6868;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .hidden {
            display: none !important;
        }
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }
        .status-connected {
            background-color: #22c55e;
        }
        .status-disconnected {
            background-color: #ef4444;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 1rem;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #666;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <!-- Configuration Modal -->
    <div id="configModal" class="modal-overlay hidden">
        <div class="modal">
            <h2>⚙️ Settings</h2>
            <form id="configForm">
                <div class="form-group">
                    <label for="deploymentUrl">LangGraph Deployment URL</label>
                    <input 
                        type="text" 
                        id="deploymentUrl" 
                        placeholder="http://127.0.0.1:6000"
                        value="http://127.0.0.1:6000"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="assistantId">Assistant ID (Graph Name)</label>
                    <input 
                        type="text" 
                        id="assistantId" 
                        placeholder="agent"
                        value="agent"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="apiKey">LangSmith API Key (optional)</label>
                    <input 
                        type="password" 
                        id="apiKey" 
                        placeholder="lsv2_..."
                    >
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" onclick="closeConfigModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Header -->
    <header class="header">
        <h1>🚀 Deep Agents UI</h1>
        <div class="header-buttons">
            <span id="statusIndicator" class="status-indicator status-disconnected"></span>
            <button class="btn" onclick="showConfigModal()">⚙️ Settings</button>
            <button class="btn btn-primary" onclick="newThread()">+ New Thread</button>
        </div>
    </header>
    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span>Threads</span>
                <button class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="loadThreads()">↻</button>
            </div>
            <div id="threadList" class="thread-list">
                <!-- Threads will be loaded here -->
            </div>
        </aside>
        <!-- Chat Container -->
        <main class="chat-container">
            <div id="messagesContainer" class="messages-container">
                <!-- Messages will be displayed here -->
                <div class="message assistant">
                    <div class="message-content">Welcome to Deep Agents UI! Set up your LangGraph deployment URL and Assistant ID to get started.</div>
                </div>
            </div>
            <div class="input-container">
                <form id="messageForm" class="input-form">
                    <textarea 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="Type your message..."
                        rows="1"
                    ></textarea>
                    <button type="submit" class="btn btn-primary">Send</button>
                </form>
            </div>
        </main>
    </div>
    <script>
        // State
        let currentThreadId = null;
        let config = null;
        let isStreaming = false;
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await checkConfig();
            loadThreads();
        });
        // Config Modal Functions
        function showConfigModal() {
            document.getElementById('configModal').classList.remove('hidden');
        }
        function closeConfigModal() {
            document.getElementById('configModal').classList.add('hidden');
        }
        async function checkConfig() {
            try {
                const response = await fetch('/api/config', {
                    credentials: 'include'  // Include cookies for session
                });
                const data = await response.json();
                if (data.configured) {
                    config = data;
                    updateStatus(true);
                    document.getElementById('deploymentUrl').value = data.deployment_url;
                    document.getElementById('assistantId').value = data.assistant_id;
                } else {
                    showConfigModal();
                }
            } catch (error) {
                console.error('Error checking config:', error);
                showConfigModal();
            }
        }
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const deploymentUrl = document.getElementById('deploymentUrl').value;
            const assistantId = document.getElementById('assistantId').value;
            const apiKey = document.getElementById('apiKey').value;
            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',  // Include cookies for session
                    body: JSON.stringify({
                        deployment_url: deploymentUrl,
                        assistant_id: assistantId,
                        langsmith_api_key: apiKey || null
                    })
                });
                if (response.ok) {
                    config = { deployment_url: deploymentUrl, assistant_id: assistantId };
                    updateStatus(true);
                    closeConfigModal();
                    addMessage('assistant', 'Settings saved successfully!');
                    loadThreads();
                } else {
                    throw new Error('Failed to save settings');
                }
            } catch (error) {
                console.error('Error saving config:', error);
                alert('Failed to save settings. Please try again.');
            }
        });
        // Status Update
        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            if (connected) {
                indicator.className = 'status-indicator status-connected';
            } else {
                indicator.className = 'status-indicator status-disconnected';
            }
        }
        // Thread Management
        async function loadThreads() {
            if (!config) return;
            try {
                const response = await fetch('/api/threads', {
                    credentials: 'include'  // Include cookies for session
                });
                const data = await response.json();
                const threadList = document.getElementById('threadList');
                threadList.innerHTML = '';
                if (data.threads && data.threads.length > 0) {
                    data.threads.forEach(thread => {
                        const threadEl = document.createElement('div');
                        threadEl.className = `thread-item ${thread.thread_id === currentThreadId ? 'active' : ''}`;
                        threadEl.textContent = `Thread ${thread.thread_id.slice(0, 8)}...`;
                        threadEl.onclick = () => selectThread(thread.thread_id);
                        threadList.appendChild(threadEl);
                    });
                } else {
                    threadList.innerHTML = '<div style="padding: 1rem; color: #666;">No threads yet</div>';
                }
            } catch (error) {
                console.error('Error loading threads:', error);
            }
        }
        async function newThread() {
            if (!config) {
                showConfigModal();
                return;
            }
            try {
                const response = await fetch('/api/threads', { 
                    method: 'POST',
                    credentials: 'include'  // Include cookies for session
                });
                const thread = await response.json();
                currentThreadId = thread.thread_id;
                addMessage('assistant', 'New thread created. How can I help you?');
                loadThreads();
            } catch (error) {
                console.error('Error creating thread:', error);
                addMessage('assistant', 'Error creating new thread.');
            }
        }
        async function selectThread(threadId) {
            currentThreadId = threadId;
            // Update active state in UI
            document.querySelectorAll('.thread-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
            // Load thread history
            try {
                const response = await fetch(`/api/threads/${threadId}/state`, {
                    credentials: 'include'  // Include cookies for session
                });
                const state = await response.json();
                // Clear and load messages
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';
                if (state.values && state.values.messages) {
                    state.values.messages.forEach(msg => {
                        if (msg.type === 'human') {
                            addMessage('user', msg.content);
                        } else if (msg.type === 'ai') {
                            addMessage('assistant', msg.content);
                        }
                    });
                }
            } catch (error) {
                console.error('Error loading thread state:', error);
            }
        }
        // Message Handling
        document.getElementById('messageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || isStreaming) return;
            if (!currentThreadId) {
                await newThread();
            }
            // Add user message
            addMessage('user', message);
            input.value = '';
            // Send message and stream response
            await sendMessage(message);
        });
        async function sendMessage(message) {
            isStreaming = true;
            console.log('🚀 Sending message:', message);
            console.log('📍 Thread ID:', currentThreadId);
            // Show typing indicator
            const container = document.getElementById('messagesContainer');
            const typingEl = document.createElement('div');
            typingEl.className = 'message assistant';
            typingEl.id = 'typingIndicator';
            typingEl.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(typingEl);
            container.scrollTop = container.scrollHeight;
            try {
                console.log('📡 Fetching /api/stream...');
                const response = await fetch('/api/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',  // Include cookies for session
                    body: JSON.stringify({
                        thread_id: currentThreadId,
                        message: message
                    })
                });
                console.log('📥 Response status:', response.status, response.ok);
                // Remove typing indicator
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) {
                    typingIndicator.remove();
                }
                // Create assistant message element
                const assistantMsg = document.createElement('div');
                assistantMsg.className = 'message assistant';
                assistantMsg.innerHTML = '<div class="message-content"></div>';
                container.appendChild(assistantMsg);
                const contentEl = assistantMsg.querySelector('.message-content');
                // Stream the response
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    let currentEvent = 'message'; // Default SSE event type
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            currentEvent = line.slice(7);
                            continue;
                        }
                        if (line.startsWith('data: ')) {
                            try {
                                const rawData = line.slice(6);
                                console.log('📥 Raw SSE data:', rawData);
                                const data = JSON.parse(rawData);
                                // Debug logging
                                console.log('📥 SSE Event Type:', currentEvent, 'Full data:', data);
                                console.log('📥 Data type:', typeof data, 'Value:', data);
                                // Handle different event types based on SSE event field
                                // Check if this is a message-related event that contains content
                                const isMessageEvent = currentEvent === 'messages' || 
                                                       currentEvent === 'messages/complete' || 
                                                       currentEvent === 'values' || 
                                                       currentEvent === 'updates' ||
                                                       currentEvent === 'message';
                                console.log('🔍 Is message event?', isMessageEvent, 'Current event:', currentEvent);
                                if (isMessageEvent) {
                                    console.log('🔍 Processing event type:', currentEvent, 'with data:', data);
                                    const content = extractMessageContent(data);
                                    console.log('✅ Extracted content:', content ? content.substring(0, 100) : 'NULL');
                                    if (content) {
                                        fullContent += content;
                                        contentEl.textContent = fullContent;
                                        container.scrollTop = container.scrollHeight;
                                    }
                                } else if (currentEvent === 'error') {
                                    console.error('❌ Server error:', data);
                                } else {
                                    // Log metadata and other non-message events without showing warning
                                    console.log('ℹ️ Other event:', currentEvent, '- Data:', data);
                                }
                            } catch (e) {
                                console.error('Failed to parse SSE data:', line, e);
                                // Skip invalid JSON
                            }
                        }
                    }
                }
                if (!fullContent) {
                    contentEl.textContent = 'Response received.';
                }
            } catch (error) {
                console.error('Error streaming message:', error);
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) {
                    typingIndicator.remove();
                }
                addMessage('assistant', 'Error: Failed to get response from agent.');
            } finally {
                isStreaming = false;
                loadThreads(); // Refresh thread list
            }
        }
        function extractMessageContent(data) {
            console.log('🔍 Extracting content from:', typeof data === 'string' ? data.substring(0, 200) : data);
            console.log('🔍 Data constructor:', data?.constructor?.name);
            console.log('🔍 Is Array?', Array.isArray(data));
            try {
                // Data is already parsed by EventSourceResponse - no need to JSON.parse()
                const parsed = data;
                // Handle array of messages (e.g., from 'messages/complete' event)
                if (Array.isArray(parsed)) {
                    console.log('📦 Detected array of messages, length:', parsed.length);
                    console.log('📦 Array contents:', JSON.stringify(parsed).substring(0, 300));
                    // Get the last AI message from the array
                    for (let i = parsed.length - 1; i >= 0; i--) {
                        const msg = parsed[i];
                        console.log('🔍 Checking message', i, ':', msg);
                        console.log('🔍 Message type:', msg?.type, 'has content:', !!msg?.content);
                        if (msg.content && (msg.type === 'ai')) {
                            const content = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content);
                            console.log('✅ Found AI message content:', content.substring(0, 100));
                            return content;
                        }
                    }
                    console.log('❌ No AI content found in array');
                    return null;
                }
                // Handle object with messages array (e.g., from 'values' event: {messages: [...]})
                if (parsed.messages && Array.isArray(parsed.messages)) {
                    console.log('📦 Detected object with messages array');
                    // Find the last AI message
                    for (let i = parsed.messages.length - 1; i >= 0; i--) {
                        const msg = parsed.messages[i];
                        console.log('🔍 Checking message at index', i, ':', msg);
                        if (msg.content && (msg.type === 'ai')) {
                            console.log('✅ Found AI message content in messages array');
                            return typeof msg.content === 'string' 
                                ? msg.content 
                                : JSON.stringify(msg.content);
                        }
                    }
                    // No AI message found - return null to avoid showing user's own message
                    console.log('⚠️ No AI message found in messages array, skipping');
                    return null;
                }
                // Handle nested messages in object (e.g., from 'updates' event: {agent: {messages: [...]}})
                // Check for any key that contains messages array
                if (typeof parsed === 'object' && !parsed.messages && !parsed.data) {
                    console.log('🔍 Checking for nested messages in object keys');
                    for (const key of Object.keys(parsed)) {
                        const nested = parsed[key];
                        console.log(`  🔍 Key '${key}':`, typeof nested, nested?.constructor?.name);
                        if (nested && typeof nested === 'object') {
                            // Check if nested object has messages array
                            if (nested.messages && Array.isArray(nested.messages)) {
                                console.log(`📦 Found messages in key '${key}'`);
                                // Find the last AI message
                                for (let i = nested.messages.length - 1; i >= 0; i--) {
                                    const msg = nested.messages[i];
                                    console.log(`    🔍 Message ${i}: type=${msg.type}, content=${msg.content ? msg.content.substring(0, 50) : 'null'}`);
                                    if (msg.content && (msg.type === 'ai')) {
                                        return typeof msg.content === 'string' 
                                            ? msg.content 
                                            : JSON.stringify(msg.content);
                                    }
                                }
                                // No AI message found - return null to avoid showing user's own message
                                console.log('⚠️ No AI message found in nested messages, skipping');
                                return null;
                            }
                            // For messages/metadata: check if nested.metadata exists and contains useful info
                            // but do not treat metadata-only events as messages
                        }
                    }
                }
                // Handle AIMessage format directly
                if (parsed.content && (parsed.type === 'ai')) {
                    return typeof parsed.content === 'string' 
                        ? parsed.content 
                        : JSON.stringify(parsed.content);
                }
                // Handle nested messages in data object (e.g., updates: {data: {agent: {messages: [...]}}})
                if (parsed.data) {
                    // Check if data contains nested structures like {agent: {messages: [...]}}
                    const dataObj = parsed.data;
                    if (typeof dataObj === 'object') {
                        // Try to find messages in any nested key
                        for (const key of Object.keys(dataObj)) {
                            const nested = dataObj[key];
                            if (nested && nested.messages && Array.isArray(nested.messages)) {
                                // Find the last AI message
                                for (let i = nested.messages.length - 1; i >= 0; i--) {
                                    const msg = nested.messages[i];
                                    if (msg.content && (msg.type === 'ai')) {
                                        return typeof msg.content === 'string' 
                                            ? msg.content 
                                            : JSON.stringify(msg.content);
                                    }
                                }
                                console.log('⚠️ No AI message found in nested messages, skipping');
                                return null;
                            }
                        }
                        // Also check if data itself has messages array
                        if (dataObj.messages && Array.isArray(dataObj.messages)) {
                            // Find the last AI message
                            for (let i = dataObj.messages.length - 1; i >= 0; i--) {
                                const msg = dataObj.messages[i];
                                if (msg.content && (msg.type === 'ai')) {
                                    return typeof msg.content === 'string' 
                                        ? msg.content 
                                        : JSON.stringify(msg.content);
                                }
                            }
                            console.log('⚠️ No AI message found in data.messages, skipping');
                            return null;
                        }
                    }
                }
                // Direct content property (only if it's an AI response)
                if (parsed.content && (parsed.type === 'ai')) {
                    return typeof parsed.content === 'string' 
                        ? parsed.content 
                        : JSON.stringify(parsed.content);
                }
                console.log('⚠️ No content found, returning null. Data:', JSON.stringify(parsed).substring(0, 200));
                return null;
            } catch (e) {
                console.error('❌ Extract error:', e);
                return String(data);
            }
        }
        function addMessage(role, content) {
            const container = document.getElementById('messagesContainer');
            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}`;
            msgEl.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            container.appendChild(msgEl);
            container.scrollTop = container.scrollHeight;
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });
    </script>
</body>
</html>
